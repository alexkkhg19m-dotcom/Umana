name: 🔄 Auto-deploy nuevo artículo

# Este workflow se ejecuta automáticamente cada vez que se modifica posts.json.
# No necesitas hacer nada más — el sitemap se actualiza solo y el sitio se despliega.

on:
  push:
    branches: [main]
    paths: [posts.json]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar sitemap.xml y páginas estáticas desde posts.json
        run: |
          node .github/scripts/generate-sitemap.js
          node generate-posts.js

      - name: Guardar sitemap y páginas estáticas en este repositorio
        run: |
          git config user.email "noreply@github.com"
          git config user.name "Umana Bot"
          git add sitemap.xml posts/
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "Auto: sitemap.xml y páginas estáticas actualizados"
          git push

      - name: Desplegar al sitio web en vivo
        env:
          LIVE_SITE_PAT: ${{ secrets.LIVE_SITE_PAT }}
        run: |
          git clone https://x-access-token:${LIVE_SITE_PAT}@github.com/Umana-Salud-Mental/umana-salud-mental.github.io.git live-site

          # Archivos del blog
          cp post.html      live-site/post.html
          cp posts.json     live-site/posts.json
          cp robots.txt     live-site/robots.txt
          cp sitemap.xml    live-site/sitemap.xml
          cp recursos.html  live-site/recursos.html
          # Páginas estáticas de artículos (para indexación directa por Google)
          mkdir -p live-site/posts
          cp posts/*.html   live-site/posts/

          # Admin panel
          mkdir -p live-site/edit
          cp edit/index.html live-site/edit/index.html

          # Dejar el workflow de auto-actualización en el sitio en vivo
          mkdir -p live-site/.github/workflows
          cp .github/workflows/sitemap-auto-update.yml live-site/.github/workflows/sitemap-auto-update.yml
          cp .github/scripts/generate-sitemap.js live-site/generate-sitemap.js

          cd live-site
          git config user.email "noreply@github.com"
          git config user.name "Umana Deploy Bot"
          git add -A
          git diff --cached --quiet && echo "Sin cambios en el sitio" && exit 0
          git commit -m "Auto-deploy: nuevo artículo publicado"
          git push

      - name: ✅ Listo
        run: |
          echo "¡Deploy completo! El sitemap y los artículos ya están en el sitio en vivo."
          echo "Google encontrará los nuevos artículos automáticamente en su próximo rastreo del sitemap."
